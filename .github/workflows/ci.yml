name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Regression tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify snapshots are committed
        run: |
          npm run test:update
          if [ -n "$(git diff tests/snapshots/)" ]; then
            echo "Snapshots are out of date. Run 'npm run test:update' and commit."
            git diff tests/snapshots/
            exit 1
          fi
